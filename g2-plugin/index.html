<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Hermes Email Bridge</title>
    <style>
      body {
        background: #232323;
        color: #e5e5e5;
        font-family: system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        touch-action: manipulation;
        overscroll-behavior: none;
      }
    </style>
  </head>
  <body>
    <div id="log" style="font-size:13px;padding:12px;white-space:pre-wrap;word-break:break-all"></div>
    <script>
      const logEl = document.getElementById('log')
      const _log = console.log.bind(console)
      const _err = console.error.bind(console)
      function append(prefix, args) {
        logEl.textContent += prefix + [...args].map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' ') + '\n'
      }
      console.log = (...a) => { _log(...a); append('', a) }
      console.error = (...a) => { _err(...a); append('ERR ', a) }
      window.onerror = (msg, src, line) => { append('CRASH ', [msg, line]) }
      window.onunhandledrejection = e => { append('REJECT ', [String(e.reason)]) }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
